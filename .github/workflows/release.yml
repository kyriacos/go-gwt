name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # goreleaser needs full history (and tags) to build the changelog.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Used to create the GitHub Release on this repo. Provided automatically.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NOTE: Homebrew tap publishing is deferred (see issue #1).
          # When re-enabled, add the goreleaser `brews:` block and a
          # HOMEBREW_TAP_TOKEN secret (a PAT with contents:write on
          # kyriacos/homebrew-tap) here.
