name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # git is preinstalled on GitHub-hosted runners; the integration tests
      # shell out to it against temp repos.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: build
        run: go build ./...

      - name: vet
        run: go vet ./...

      - name: test (race)
        run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: golangci-lint
        # v8 targets golangci-lint v2 (our .golangci.yml uses the v2 schema);
        # v6 installs v1, which rejects a v2 config.
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
