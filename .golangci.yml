version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
  settings:
    govet:
      disable:
        - fieldalignment
        - shadow
      enable-all: true
    misspell:
      locale: US
      ignore-rules:
        # GitHub's API spells this conclusion with two l's; keep it verbatim.
        - cancelled
    staticcheck:
      checks:
        - all
        # Opinionated refactor hints (tagged switch / De Morgan), not bugs.
        - -QF1001
        - -QF1002
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: superfluous-else
        - name: unreachable-code
        - name: var-declaration
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
      # Tests deliberately reassign the model after each Update for a uniform
      # step pattern; the final store is sometimes unread.
      - linters:
          - staticcheck
        text: SA4006
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/kyriacos/go-gwt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
