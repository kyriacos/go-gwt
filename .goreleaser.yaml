# goreleaser configuration (v2 schema). Run locally with `goreleaser check`.
# Release is driven by pushing a tag matching `v*`; see
# .github/workflows/release.yml.
version: 2

project_name: gwt

before:
  hooks:
    - go mod tidy

builds:
  - id: gwt
    main: ./cmd/gwt
    binary: gwt
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    # cmd/gwt/main.go declares `version`, `commit`, and `date` package vars.
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: gwt
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      # TODO: once the binary can emit man pages and shell completions at build
      # time (e.g. `gwt man` / `gwt completion <shell>`), generate them in a
      # build hook and add them here so archives ship docs + completions.

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

# Homebrew tap publishing is deferred — see issue #1. When ready, add
# a `brews:` block here targeting kyriacos/homebrew-tap and wire the
# HOMEBREW_TAP_TOKEN secret in .github/workflows/release.yml.

release:
  github:
    owner: kyriacos
    name: go-gwt
  prerelease: auto
